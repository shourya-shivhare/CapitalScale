version: '3.9'
services:


  # ── Redis (Session Store & Token Revocation — unchanged) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_loan_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - loan_network

  # ── Backend (Express.js — now using PostgreSQL only) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_loan_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      # Override .env file with Docker service hostnames
      - DATABASE_URL=postgresql://loan_ai:loan_ai_secret@postgres:5432/ai_loan_ag
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-services-python:5001
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - loan_network

  # ── AI Services (Python FastAPI — replaces Node.js ai-services) ───────────
  ai-services-python:
    build:
      context: ./ai-services-python
      dockerfile: Dockerfile
    container_name: ai_loan_ai_services
    restart: unless-stopped
    ports:
      - '5001:5001'
    env_file:
      - ./ai-services-python/.env
    environment:
      # Docker service hostname overrides
      - DATABASE_URL=postgresql://loan_ai:loan_ai_secret@postgres:5432/ai_loan_ag
      - BACKEND_URL=http://host.docker.internal:5000
    volumes:
      - ./ai-services-python:/app
      - ai_service_cache:/root/.paddleocr      # PaddleOCR model cache
    networks:
      - loan_network

  # ── Frontend (Vite dev server — unchanged) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_loan_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - loan_network

volumes:
  postgres_data:
  ai_service_cache:

networks:
  loan_network:
    driver: bridge
